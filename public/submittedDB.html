<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提出データ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <script src="/js/config.js"></script>
</head>
<body>
    <div class="container mx-auto px-4 py-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">
                提出データ
            </h1>
            <button onclick="exportSubmittedDBCSV()" class="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700">
                <i class="ri-download-line"></i>CSV出力
            </button>
        </div>

        <!-- Filter Bar -->
        <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-4">
            <div class="flex flex-wrap gap-3 items-end">
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-gray-600">開始日</label>
                    <input type="date" id="sdbFilterStartDate" class="px-3 py-2 border border-gray-300 rounded-lg text-sm" oninput="sdbDebouncedLoad()">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-gray-600">終了日</label>
                    <input type="date" id="sdbFilterEndDate" class="px-3 py-2 border border-gray-300 rounded-lg text-sm" oninput="sdbDebouncedLoad()">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-gray-600">品番</label>
                    <input type="text" id="sdbFilterHinban" placeholder="例: 62410-30410" class="px-3 py-2 border border-gray-300 rounded-lg text-sm w-40" oninput="sdbDebouncedLoad()">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-gray-600">看板ID</label>
                    <input type="text" id="sdbFilterKanbanId" placeholder="例: A947" class="px-3 py-2 border border-gray-300 rounded-lg text-sm w-28" oninput="sdbDebouncedLoad()">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-gray-600">製品名</label>
                    <input type="text" id="sdbFilterProductName" placeholder="製品名で検索" class="px-3 py-2 border border-gray-300 rounded-lg text-sm w-40" oninput="sdbDebouncedLoad()">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-gray-600">作業者</label>
                    <input type="text" id="sdbFilterOperator" placeholder="作業者名で検索" class="px-3 py-2 border border-gray-300 rounded-lg text-sm w-36" oninput="sdbDebouncedLoad()">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-gray-600">LH/RH</label>
                    <select id="sdbFilterLhRh" class="px-3 py-2 border border-gray-300 rounded-lg text-sm" onchange="loadSubmittedDB()">
                        <option value="all">全て</option>
                        <option value="LH">LH</option>
                        <option value="RH">RH</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-gray-600">表示件数</label>
                    <select id="sdbFilterLimit" class="px-3 py-2 border border-gray-300 rounded-lg text-sm" onchange="loadSubmittedDB()">
                        <option value="50">50件</option>
                        <option value="100" selected>100件</option>
                        <option value="200">200件</option>
                        <option value="500">500件</option>
                    </select>
                </div>
                <div class="flex gap-2 ml-auto items-end">
                    <button onclick="clearSubmittedDBFilters()" class="px-3 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm hover:bg-gray-300">
                        <i class="ri-refresh-line mr-1"></i>リセット
                    </button>
                </div>
            </div>
        </div>

        <!-- Summary Bar -->
        <div id="submittedDBSummary" class="hidden mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg text-sm flex flex-wrap gap-4"></div>

        <!-- Table -->
        <div id="submittedDBTableContainer">
            <p class="text-gray-400 text-sm py-8 text-center">読み込み中...</p>
        </div>

        <!-- Pagination -->
        <div id="submittedDBPagination" class="flex items-center justify-between mt-4 hidden">
            <div id="submittedDBPageInfo" class="text-sm text-gray-600"></div>
            <div class="flex gap-2" id="submittedDBPageBtns"></div>
        </div>

        <!-- Detail Modal -->
    <div id="sdbDetailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4" onclick="closeSdbDetail(event)">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col" onclick="event.stopPropagation()">
            <!-- Modal Header -->
            <div class="flex items-start justify-between p-6 border-b">
                <div>
                    <p id="sdbModalDate" class="text-xs text-gray-400 mb-1"></p>
                    <h2 id="sdbModalTitle" class="text-xl font-bold text-gray-800"></h2>
                    <p id="sdbModalSub" class="text-sm text-gray-500 mt-0.5"></p>
                </div>
                <button onclick="closeSdbDetail()" class="ml-4 text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
            </div>
            <!-- Modal Body -->
            <div class="overflow-y-auto flex-1 p-6 space-y-5">
                <!-- Production Info -->
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    <div class="bg-gray-50 rounded-xl p-3 text-center">
                        <p class="text-xs text-gray-400 mb-1">良品数</p>
                        <p id="sdbModalGood" class="text-2xl font-bold text-green-600"></p>
                    </div>
                    <div class="bg-gray-50 rounded-xl p-3 text-center">
                        <p class="text-xs text-gray-400 mb-1">工数</p>
                        <p id="sdbModalManHours" class="text-2xl font-bold text-blue-600"></p>
                        <p class="text-xs text-gray-400">h</p>
                    </div>
                    <div class="bg-gray-50 rounded-xl p-3 text-center">
                        <p class="text-xs text-gray-400 mb-1">CT</p>
                        <p id="sdbModalCT" class="text-2xl font-bold text-purple-600"></p>
                        <p class="text-xs text-gray-400">min/piece</p>
                    </div>
                    <div class="bg-gray-50 rounded-xl p-3 text-center">
                        <p class="text-xs text-gray-400 mb-1">LH/RH</p>
                        <p id="sdbModalLhRh" class="text-2xl font-bold text-gray-700"></p>
                    </div>
                </div>

                <!-- Operators + Time -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="bg-gray-50 rounded-xl p-4 space-y-2">
                        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">作業者</p>
                        <div class="flex items-center gap-2">
                            <i class="ri-user-line text-blue-400"></i>
                            <span id="sdbModalOp1" class="text-sm text-gray-700"></span>
                        </div>
                        <div class="flex items-center gap-2">
                            <i class="ri-user-line text-gray-300"></i>
                            <span id="sdbModalOp2" class="text-sm text-gray-400"></span>
                        </div>
                    </div>
                    <div class="bg-gray-50 rounded-xl p-4 space-y-2">
                        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">時間</p>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">開始</span><span id="sdbModalStart" class="font-medium"></span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">終了</span><span id="sdbModalEnd" class="font-medium"></span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">休憩</span><span id="sdbModalBreak" class="font-medium"></span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">トラブル</span><span id="sdbModalTrouble" class="font-medium"></span>
                        </div>
                    </div>
                </div>

                <!-- Defects -->
                <div id="sdbModalDefectsSection">
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">不良内訳</p>
                    <div id="sdbModalDefects" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
                </div>

                <!-- Remarks -->
                <div id="sdbModalRemarksSection" class="hidden">
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">備考</p>
                    <p id="sdbModalRemarks" class="text-sm text-gray-700 bg-yellow-50 border border-yellow-200 rounded-lg p-3"></p>
                </div>
                <div id="sdbModalOtherSection" class="hidden">
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">その他詳細</p>
                    <p id="sdbModalOther" class="text-sm text-gray-700 bg-gray-50 border border-gray-200 rounded-lg p-3"></p>
                </div>
            </div>
            <!-- Modal Footer -->
            <div class="flex justify-between items-center px-6 py-4 border-t bg-gray-50 rounded-b-2xl">
                <span id="sdbModalFrom" class="text-xs text-gray-400"></span>
                <button onclick="closeSdbDetail()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm hover:bg-gray-300">閉じる</button>
            </div>
        </div>
    </div><!-- end modal -->
    </div><!-- end container -->

</body>
</html>
